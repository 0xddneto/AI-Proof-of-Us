name: Publish npm package with provenance

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm for trusted publishing
        run: npm install --global npm@^11.15.0

      - name: Install dependencies
        run: npm ci

      - name: Test MCP package
        run: npm run test -w mcp-server

      - name: Publish with npm provenance
        run: npm publish --workspace mcp-server --provenance --access public
